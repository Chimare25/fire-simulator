<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FIREシミュレーター</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>FIREシミュレーター</h1>
<p class="description">
現在の資産・投資額から<br>
<strong>FIRE達成年齢と資産推移</strong>をシミュレーションします
</p>
<div class="container">

<label>年齢</label>
<input id="age" type="number" value="30">

<label>現在資産（万円）</label>
<input id="asset" type="number" value="1500">

<label>年間投資額（万円）</label>
<input id="invest" type="number" value="250">

<label>想定利回り（%）</label>
<input id="returnRate" type="number" value="5">

<label>年間生活費（万円）</label>
<input id="expense" type="number" value="300">

<button onclick="calculate()">計算する</button>

<h2 id="result"></h2>

<canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>

<footer>
<p>
このツールはブラウザ上で計算しています。<br>
入力データは保存されません。
</p>
</footer>

</html>
